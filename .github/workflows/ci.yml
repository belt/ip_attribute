# CI — lint, test matrix, audit.
#
# Actions pinned to full SHA for supply-chain safety.
# Node 24 actions (v5+) — Node 20 deprecated June 2026.
# Concurrency: cancel stale runs on same branch/PR.
#
# Matrix: Ruby 3.4 + 4.0 × ActiveRecord 7.2 + 8.1
# AR_VERSION env var pins activerecord/activesupport in Gemfile.
---
name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "spec/**"
      - "Gemfile"
      - "ip_attribute.gemspec"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "lib/**"
      - "spec/**"
      - "Gemfile"
      - "ip_attribute.gemspec"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec standardrb --no-fix
      - run: bundle exec reek lib/

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.4", "4.0"]
        ar: ["7.2", "8.1"]
        exclude:
          - ruby: "4.0"
            ar: "7.2"
    env:
      AR_VERSION: ${{ matrix.ar }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: bundle exec rspec

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ruby/setup-ruby@7372622e62b60b3cb750dcd2b9e32c247ffec26a # v1.302.0
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec bundler-audit check --update
