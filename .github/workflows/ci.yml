# CI — lint, test matrix, audit.
#
# Actions pinned to full SHA for supply-chain safety.
# Concurrency: cancel stale runs on same branch/PR.
#
# Matrix: Ruby 3.4 + 4.0 × ActiveRecord 7.2 + 8.1
# AR_VERSION env var pins activerecord/activesupport in Gemfile.
---
name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - "spec/**"
      - "Gemfile"
      - "ip_attribute.gemspec"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "lib/**"
      - "spec/**"
      - "Gemfile"
      - "ip_attribute.gemspec"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4 # v1.207.0
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec standardrb --no-fix

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.4", "4.0"]
        ar: ["7.2", "8.1"]
        exclude:
          # AR 7.2 is not tested against Ruby 4.0
          # (Rails 7.2 predates Ruby 4.0 release)
          - ruby: "4.0"
            ar: "7.2"
    env:
      AR_VERSION: ${{ matrix.ar }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4 # v1.207.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - run: |
          echo "Ruby: $(ruby -v)"
          echo "AR_VERSION: $AR_VERSION"
          bundle exec ruby -e "puts ActiveRecord::VERSION::STRING" 2>/dev/null || true
      - run: bundle exec rspec

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4 # v1.207.0
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - run: bundle exec bundler-audit check --update
