---
# Reek configuration — code smell detection

exclude_paths:
  - spec

detectors:
  TooManyStatements:
    max_statements: 15

  # Core conversion methods can't be split further without hurting readability
  TooManyStatements:
    exclude:
      - "IpAttribute::ActiveRecordIntegration"
      - "IpAttribute::AddressFamily"
      - "IpAttribute::Converter"
      - "IpAttribute::Type"

  # AF_INET6 is the RFC/POSIX domain term
  UncommunicativeMethodName:
    exclude:
      - "IpAttribute::AddressFamily"

  UncommunicativeVariableName:
    exclude:
      - "IpAttribute::AddressFamily"
      - "IpAttribute::ActiveRecordIntegration"

  # Separate define_method blocks share helper calls — not real duplication
  DuplicateMethodCall:
    exclude:
      - "IpAttribute::ActiveRecordIntegration"

  # Module functions are the intended API
  UtilityFunction:
    exclude:
      - "IpAttribute::Converter"
      - "IpAttribute::AddressFamily"
      - "IpAttribute::ActiveRecordIntegration"

  # nil is a valid input per the API contract
  NilCheck:
    exclude:
      - "IpAttribute::Converter"
      - "IpAttribute::Type"
      - "IpAttribute::ActiveRecordIntegration"

  # normalize_mapped is an intentional API parameter
  ControlParameter:
    exclude:
      - "IpAttribute::Converter"
      - "IpAttribute::ConversionError"

  # Boolean params are the API design choice
  BooleanParameter:
    exclude:
      - "IpAttribute::Converter"
      - "IpAttribute::Type"

  # ActiveModel::Type delegates to Converter by design.
  # SingleConfig is a data carrier — methods that unpack it reference it more than self.
  FeatureEnvy:
    exclude:
      - "IpAttribute::Type"
      - "IpAttribute::QueryMethods"
      - "IpAttribute::ActiveRecordIntegration"

  # RFC-derived constants are all necessary
  TooManyConstants:
    exclude:
      - "IpAttribute::Converter"

  UnusedPrivateMethod:
    enabled: false
